name: Apply Security Patch
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Remove Trakt token injection from refresh_data.py
        run: |
          python3 << 'PYEOF'
          with open('scripts/refresh_data.py', 'r') as f:
              content = f.read()
          old = """# Inject Trakt credentials for client-side mark-as-watched
_trakt_token = get_trakt_access_token()
if _trakt_token and CLIENT_ID:
    data["_tc"] = CLIENT_ID
    data["_tt"] = _trakt_token"""
          new = """# NOTE: Trakt credentials (_tc/_tt) are no longer embedded in the data blob.
# Authenticated users get tokens via Supabase; unauthenticated visitors are read-only."""
          if old in content:
              content = content.replace(old, new)
              with open('scripts/refresh_data.py', 'w') as f:
                  f.write(content)
              print('Edit applied successfully')
          else:
              print('ERROR: Target block not found')
              exit(1)
          PYEOF
      - name: Remove this workflow file
        run: rm .github/workflows/security-patch.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --staged || git commit -m "Security: remove Trakt token embedding from data blob"
          git push

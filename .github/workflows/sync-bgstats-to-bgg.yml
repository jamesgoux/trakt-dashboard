name: Sync BG Stats to BGG

# Manual-only. Pushes local BG Stats plays (bggId=0) to BoardGameGeek via
# geekplay.php. Defaults to dry-run. Also supports cleanup mode for deleting
# duplicate plays (e.g. after parallel sync runs created duplicates).
#
# Concurrency: `group: bgg-sync` + cancel-in-progress prevents parallel runs.
concurrency:
  group: bgg-sync
  cancel-in-progress: false
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'sync:dry-run / sync:commit / cleanup:dry-run / cleanup:commit'
        required: true
        default: 'sync:dry-run'
        type: choice
        options:
          - sync:dry-run
          - sync:commit
          - cleanup:dry-run
          - cleanup:commit
      limit:
        description: 'Stop after N plays/deletes (0 = all)'
        required: false
        default: '0'
      delete_manifest:
        description: 'Path to delete manifest JSON (cleanup mode only)'
        required: false
        default: 'data/cleanup_targets.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run
        env:
          BGG_USERNAME: jamesgoux
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          case "${{ inputs.mode }}" in
            sync:dry-run) python scripts/sync_bgstats_to_bgg.py --dry-run --limit ${{ inputs.limit }} ;;
            sync:commit)  python scripts/sync_bgstats_to_bgg.py --commit  --limit ${{ inputs.limit }} ;;
            cleanup:dry-run) python scripts/cleanup_bgg_duplicates.py --input ${{ inputs.delete_manifest }} --limit ${{ inputs.limit }} ;;
            cleanup:commit)  python scripts/cleanup_bgg_duplicates.py --input ${{ inputs.delete_manifest }} --commit --limit ${{ inputs.limit }} ;;
          esac
      - name: Commit updated bgstats_export.json
        if: ${{ inputs.mode == 'sync:commit' }}
        run: |
          if git diff --quiet data/bgstats_export.json; then
            echo "No bggId updates to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --no-rebase -X ours origin main || true
          git add data/bgstats_export.json
          git commit -m "Sync BG Stats local plays to BGG — update bggIds [skip ci]"
          for i in 1 2 3; do
            git pull --no-rebase -X ours origin main || true
            git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

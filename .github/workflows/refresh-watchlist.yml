name: Watchlist + JustWatch (standalone)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watchlist
  cancel-in-progress: false

jobs:
  watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh Watchlist with JustWatch prices
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/refresh_watchlist.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --staged || git commit -m "Watchlist refresh $(date -u +'%H:%M UTC')"
          git pull --no-rebase -X ours origin main || true
          git push

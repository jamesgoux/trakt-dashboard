name: Explore Serializd API

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Explore API
        env:
          SERIALIZD_EMAIL: ${{ secrets.SERIALIZD_EMAIL }}
          SERIALIZD_PASSWORD: ${{ secrets.SERIALIZD_PASSWORD }}
        run: python scripts/_explore_serializd.py 2>&1 | tee /tmp/serializd_explore.txt
      - name: Save output
        if: always()
        run: |
          cp /tmp/serializd_explore.txt data/serializd_explore.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/serializd_explore.txt
          git diff --quiet --staged || git commit -m "Serializd API exploration output"
          git pull --no-rebase -X ours origin main || true
          git push || true

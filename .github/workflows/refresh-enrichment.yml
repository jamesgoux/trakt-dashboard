name: Enrichment

on:
  schedule:
    - cron: '45 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: enrichment
  cancel-in-progress: false

jobs:
  enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Auto-refresh Trakt token
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REFRESH_TOKEN: ${{ secrets.TRAKT_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/refresh_trakt_token.py --user=jamesgoux
        continue-on-error: true

      - name: Backfill book genres
        run: python scripts/refresh_book_genres.py
        continue-on-error: true

      - name: Backfill artist genres
        run: python scripts/refresh_artist_genres.py
        continue-on-error: true

      - name: Backfill Last.fm daily scrobbles
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          LASTFM_DAILY_BUDGET: "100"
        run: python scripts/backfill_lastfm_daily.py
        continue-on-error: true

      - name: Backfill setlist songs
        env:
          SETLIST_FM_API_KEY: ${{ secrets.SETLIST_FM_API_KEY }}
          SETLIST_SONG_BUDGET: "50"
        run: python scripts/backfill_setlist_songs.py
        continue-on-error: true

      - name: Sync Letterboxd to Trakt
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
        run: python scripts/sync_letterboxd_to_trakt.py
        continue-on-error: true

      - name: Refresh health data
        env:
          GH_HEALTH_TOKEN: ${{ secrets.GH_SPORTS_PAT }}
        run: python scripts/refresh_health.py
        continue-on-error: true

      - name: Refresh stale JustWatch prices
        run: python scripts/refresh_jw_stale.py
        continue-on-error: true

      - name: Rebuild dashboard (full refresh)
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: "1"
        run: python scripts/refresh_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --staged || git commit -m "Enrichment $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --no-rebase -X ours origin main || true
          git push

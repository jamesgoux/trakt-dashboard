name: Refresh Headshots

on:
  schedule:
    - cron: '15 4 * * *'  # Daily at 4:15 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  headshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new headshots
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
        run: python scripts/refresh_headshots.py

      - name: Backfill book genres
        run: python scripts/refresh_book_genres.py

      - name: Backfill artist genres
        run: python scripts/refresh_artist_genres.py

      - name: Rebuild dashboard (full refresh with cast+studios)
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          FULL_REFRESH: "1"
        run: python scripts/refresh_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --staged || git commit -m "Daily headshot refresh $(date -u +'%Y-%m-%d')"
          git push

name: Refresh Headshots

on:
  schedule:
    - cron: '15 */2 * * *'  # Every 2 hours at :15
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

concurrency:
  group: refresh-headshots
  cancel-in-progress: false

jobs:
  headshots:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new headshots
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/refresh_headshots.py

      - name: Backfill book genres
        run: python scripts/refresh_book_genres.py

      - name: Backfill artist genres
        run: python scripts/refresh_artist_genres.py

      - name: Backfill Last.fm daily scrobbles
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          LASTFM_DAILY_BUDGET: "100"
        run: python scripts/backfill_lastfm_daily.py

      - name: Sync Letterboxd watches to Trakt (one-time)
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
        run: python scripts/sync_letterboxd_to_trakt.py
        continue-on-error: true

      - name: Rebuild dashboard (full refresh with cast+studios)
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          FULL_REFRESH: "1"
        run: |
          python scripts/refresh_upnext.py
          python scripts/refresh_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --staged || git commit -m "Daily headshot refresh $(date -u +'%Y-%m-%d')"
          # Pull with ours strategy for data conflicts (this workflow has fresher data)
          git pull --no-rebase -X ours origin main || true
          git push

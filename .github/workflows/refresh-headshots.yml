name: Headshots + Sports

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: headshots
  cancel-in-progress: false

jobs:
  headshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore pipeline caches
        uses: actions/cache@v4
        with:
          path: |
            data/people.json
            data/season_credits.json
            data/entries_cache.json
            data/other_crew.json
            data/directors.json
            data/writers.json
            data/studios.json
            data/crew_episodes.json
            data/tmdb_credits_done.json
            data/tmdb_trakt_cache.json
            data/lb_tmdb_cache.json
            data/slug_recency.json
            data/slug_tmdb.json
            data/visible_priority.json
            data/migration_candidates.json
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch headshots
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/refresh_headshots.py

      - name: Refresh sports schedules
        run: python scripts/refresh_sports_schedule.py
        continue-on-error: true

      - name: Backfill crew episodes
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/backfill_crew_episodes.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html templates/ scripts/ .gitignore data/
          git diff --quiet --staged && exit 0
          git commit -m "Headshots + sports $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git fetch --depth=1 origin main
            git rebase origin/main --strategy-option=ours || git rebase --abort
            git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

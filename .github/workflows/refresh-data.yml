name: Core Build

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: core-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore pipeline caches
        uses: actions/cache@v4
        with:
          path: |
            data/people.json
            data/season_credits.json
            data/entries_cache.json
            data/other_crew.json
            data/directors.json
            data/writers.json
            data/studios.json
            data/crew_episodes.json
            data/tmdb_credits_done.json
            data/tmdb_trakt_cache.json
            data/lb_tmdb_cache.json
            data/slug_recency.json
            data/slug_tmdb.json
            data/visible_priority.json
            data/migration_candidates.json
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Auto-refresh Trakt token
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REFRESH_TOKEN: ${{ secrets.TRAKT_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/refresh_trakt_token.py --user=jamesgoux
        continue-on-error: true

      # ── External Sources (parallel — all write to separate data files) ──
      - name: Refresh external sources
        env:
          GOODREADS_USER_ID: ${{ secrets.GOODREADS_USER_ID }}
          SETLIST_FM_API_KEY: ${{ secrets.SETLIST_FM_API_KEY }}
          POCKETCASTS_EMAIL: ${{ secrets.POCKETCASTS_EMAIL }}
          POCKETCASTS_PASSWORD: ${{ secrets.POCKETCASTS_PASSWORD }}
          SERIALIZD_EMAIL: ${{ secrets.SERIALIZD_EMAIL }}
          SERIALIZD_PASSWORD: ${{ secrets.SERIALIZD_PASSWORD }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
        run: |
          python scripts/refresh_letterboxd.py &
          python scripts/refresh_goodreads.py &
          python scripts/refresh_setlist.py &
          python scripts/refresh_pocketcasts.py &
          python scripts/refresh_serializd.py &
          python scripts/refresh_lastfm.py &
          wait
        timeout-minutes: 5
        continue-on-error: true

      # ── Watchlist + Up Next ────────────────────────────────────
      - name: Refresh Watchlist + JustWatch
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/refresh_watchlist.py
        continue-on-error: true

      - name: Refresh Up Next
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/refresh_upnext.py
        continue-on-error: true

      - name: Refresh Upcoming Calendar
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/refresh_upcoming.py
        continue-on-error: true

      # ── Build Dashboard ────────────────────────────────────────
      - name: Refresh Trakt data + rebuild HTML
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/refresh_data.py

      # ── Drain diary sync queues (Iris → Letterboxd + Serializd) ──
      # Letterboxd sync: uses deep-link approach (opens in user's browser).
      # Queue rows are stored in letterboxd_queue for tracking only.
      # Pipeline sync will be enabled when official API key is approved.

      - name: Sync Serializd review queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/sync_serializd.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html templates/ scripts/ .gitignore data/
          git diff --quiet --staged && exit 0
          git commit -m "Core build $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git fetch --depth=1 origin main
            git rebase origin/main --strategy-option=ours || git rebase --abort
            git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      # ── Process pending refresh requests ────────────────────
      - name: Process pending user refreshes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
        run: python scripts/process_refresh_queue.py
        continue-on-error: true

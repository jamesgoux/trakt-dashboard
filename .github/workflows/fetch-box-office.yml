name: Fetch Box Office Data
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch TMDB data + IMDB IDs
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
        run: python scripts/fetch_box_office.py
      - name: Scrape Box Office Mojo (20 threads)
        run: python scripts/fetch_bom.py
      - name: Commit results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/box_office.json
          git diff --staged --quiet || git commit -m 'Add box office data (TMDB + BOM) [skip ci]'
          for i in 1 2 3; do
            git pull --no-rebase -X ours origin main || true
            git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
